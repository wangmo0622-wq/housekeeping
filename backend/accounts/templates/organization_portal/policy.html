<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title }}</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 24px 16px 32px;
    }
    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.06);
      padding: 20px;
    }
    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.3;
    }
    .meta {
      margin-top: 8px;
      font-size: 12px;
      color: #64748b;
    }
    .content {
      margin-top: 18px;
      color: #334155;
      line-height: 1.8;
      word-break: break-word;
    }
    .back {
      display: inline-block;
      margin-bottom: 12px;
      color: #2563eb;
      text-decoration: none;
      font-size: 14px;
    }
    .back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="/org/login/">返回登录</a>
    <div class="card">
      <h1>{{ title }}</h1>
      <div class="meta">最后更新时间：{{ updated_at|date:"Y-m-d H:i" }}</div>
      <div class="content">{% if content %}{{ content|safe }}{% else %}暂无内容{% endif %}</div>
    </div>
  </div>
</body>
</html>
