{% extends "admin/base.html" %}
{% load i18n static %}

{# 轻量注入 daisyUI + 自定义 CSS：尽量不重写 Django admin 结构 #}
{% block extrahead %}
  <script>
    document.documentElement.setAttribute('data-theme', 'light');
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style type="text/tailwindcss">
    @layer base {
      /* 全局覆盖 Django Admin 字体与背景 */
      body { @apply bg-slate-50 text-slate-800 font-sans; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      
      /* 美化列表页与编辑页的外层容器 */
      #content { @apply max-w-7xl mx-auto px-6 py-8; }
      
      /* 模块 (Module) 与卡片样式 */
      .module { @apply bg-white rounded-2xl shadow-sm border border-slate-200 mb-6 overflow-hidden; }
      .module h2, .module caption, .inline-group h2 { @apply bg-indigo-50/50 text-indigo-800 text-sm font-bold uppercase tracking-wider px-6 py-4 border-b border-slate-100 m-0; }
      
      /* 表单内部行 (Row) 布局 */
      .form-row { @apply border-b border-slate-50 px-6 py-5 flex flex-col md:flex-row md:items-start gap-2 md:gap-6; }
      .form-row:last-child { @apply border-0; }
      
      /* 标签 (Label) 样式 */
      .form-row > div > label { @apply text-sm font-semibold text-slate-600 min-w-[160px] pt-2; }
      .form-row > div > div { @apply flex-1 flex flex-col gap-1; }
      
      /* 输入框 (Input, Select, Textarea) 统一样式 */
      .vTextField, .vURLField, .vLargeTextField, select, input[type="text"], input[type="password"], input[type="email"], input[type="number"] {
        @apply w-full max-w-2xl px-4 py-2.5 rounded-lg border border-slate-300 text-sm text-slate-800 bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-colors shadow-sm outline-none;
      }
      .vLargeTextField { @apply min-h-[120px]; }
      
      /* 帮助文本 (Help text) */
      .help { @apply text-xs text-slate-400 mt-1 block; }
      
      /* 折叠面板 (Collapse) */
      fieldset.collapse { @apply border border-slate-200 rounded-2xl mt-4 mb-6 bg-white overflow-hidden; }
      fieldset.collapse.collapsed { @apply border-b-0 rounded-b-none border-x-0 bg-transparent; }
      fieldset.collapse h2 { @apply flex items-center justify-between cursor-pointer hover:bg-indigo-50 transition-colors; }
      fieldset.collapse h2 a { @apply text-indigo-600 font-medium; }
      
      /* 提交按钮栏 (Submit Row) */
      .submit-row { @apply bg-slate-50/80 backdrop-blur-sm border-t border-slate-200 px-6 py-4 mt-8 rounded-xl flex items-center justify-end gap-3 sticky bottom-4 z-10 shadow-lg shadow-slate-200/50; }
      .submit-row input[type="submit"] { @apply px-6 py-2.5 rounded-lg text-sm font-semibold cursor-pointer transition-all active:scale-95 border-0; }
      .submit-row input[name="_save"] { @apply bg-indigo-600 text-white shadow-sm hover:bg-indigo-700 hover:shadow-md; }
      .submit-row input[name="_addanother"], .submit-row input[name="_continue"] { @apply bg-white text-slate-700 border border-slate-200 hover:bg-slate-50 hover:border-slate-300; }
      .submit-row a.deletelink { @apply mr-auto text-rose-600 font-medium px-4 py-2 hover:bg-rose-50 rounded-lg transition-colors; }
      
      /* 错误提示 */
      .errornote { @apply bg-rose-50 border-l-4 border-rose-500 text-rose-700 p-4 rounded-r-lg mb-6 font-medium text-sm; }
      ul.errorlist li { @apply text-rose-600 text-xs font-medium mt-1; }
      
      /* Inline 表单组 */
      .inline-group { @apply bg-white border border-slate-200 rounded-2xl overflow-hidden mt-8 shadow-sm; }
      .inline-related { @apply border-b border-slate-100 last:border-0; }
      .inline-related h3 { @apply bg-slate-50 px-6 py-3 text-sm font-semibold text-slate-700 border-b border-slate-100 m-0 flex justify-between items-center; }
    }
  </style>
  <link rel="stylesheet" href="{% static 'css/output.css' %}">
  <link rel="stylesheet" href="{% static 'admin_theme/admin_theme.css' %}">
{% endblock %}

{% block branding %}
  <div id="site-name">
    <a href="{% url 'admin:index' %}">{{ site_header|default:"虔诚家政管理平台" }}</a>
  </div>
{% endblock %}
