services:
  backend:
    build: ./backend
    container_name: jiazheng_backend
    network_mode: host
    volumes:
      - ./backend:/app
      - ./backend/staticfiles:/app/staticfiles
      - ./backend/media:/app/media
      - ./backend/db.sqlite3:/app/db.sqlite3
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             gunicorn config.wsgi:application -b 0.0.0.0:8000 -w 4 --timeout 120"

  nginx:
    image: nginx:alpine
    container_name: jiazheng_nginx
    network_mode: host
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./backend/staticfiles:/usr/share/nginx/html/static
      - ./backend/media:/usr/share/nginx/html/media
    depends_on:
      - backend
    restart: always
