# 数据库账号与根目录 .env 中 POSTGRES_* 保持一致（Compose 会自动读取同目录 .env 做变量替换）
services:
  db:
    image: postgres:14-alpine
    container_name: jiazheng_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jiazheng}
      POSTGRES_USER: ${POSTGRES_USER:-duoduo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jiazheng_secret_pw}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

  redis:
    image: redis:6-alpine
    container_name: jiazheng_redis
    ports:
      - "6379:6379"
    restart: always

  backend:
    build: ./backend
    container_name: jiazheng_backend
    volumes:
      - ./backend:/app
      - ./backend/staticfiles:/app/staticfiles
      - ./backend/media:/app/media
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      POSTGRES_DB: ${POSTGRES_DB:-jiazheng}
      POSTGRES_USER: ${POSTGRES_USER:-duoduo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jiazheng_secret_pw}
      # 容器内必须连服务名 db，覆盖 .env 里给本机用的 POSTGRES_HOST=localhost
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      USE_REDIS: "true"
    depends_on:
      - db
      - redis
    restart: always
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate &&
             gunicorn config.wsgi:application -b 0.0.0.0:8000 -w 4 --timeout 120"

  nginx:
    image: nginx:alpine
    container_name: jiazheng_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      # 与 Django STATIC_ROOT（collected_static）一致，否则 Nginx 下 /static/ 会缺新文件（如机构门户 CSS）
      - ./backend/collected_static:/usr/share/nginx/html/static
      - ./backend/media:/usr/share/nginx/html/media
    depends_on:
      - backend
    restart: always
    ports:
      - "80:80"

volumes:
  postgres_data:
